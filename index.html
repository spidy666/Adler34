<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>34-0 — Build the Greatest SGE XI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:   #E1001A;
      --black: #0A0A0A;
      --white: #F4F1EB;
      --gray:  #2A2A2A;
      --dim:   #6B6B6B;
      --gold:  #D4A017;
      --green: #2D7A3A;
      --screen-bg: #0F0F0F;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-serif:   'Source Serif 4', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--screen-bg);
      color: var(--white);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 2px solid var(--red);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--black);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .eagle-svg { width: 42px; height: 42px; }
    .logo-text { line-height: 1; }
    .logo-title { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 0.08em; color: var(--red); }
    .logo-sub { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
    .header-right { text-align: right; font-size: 0.7rem; color: var(--dim); letter-spacing: 0.12em; }
    .header-right strong { display: block; font-size: 1.1rem; color: var(--white); font-family: var(--font-display); letter-spacing: 0.1em; }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── FORMATION PICKER ── */
    .fp-hero {
      text-align: center;
      margin-bottom: 36px;
      padding-top: 12px;
    }
    .fp-hero-title {
      font-family: var(--font-display);
      font-size: 3rem;
      letter-spacing: 0.1em;
      color: var(--white);
    }
    .fp-hero-sub {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .formation-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 740px;
      margin: 0 auto;
    }
    @media (max-width: 580px) { .formation-grid { grid-template-columns: repeat(2, 1fr); } }
    .formation-card {
      background: var(--black);
      border: 1px solid var(--gray);
      border-top: 3px solid var(--gray);
      padding: 18px 14px 14px;
      cursor: pointer;
      text-align: center;
      transition: border-top-color 0.15s, background 0.15s, transform 0.12s;
    }
    .formation-card:hover { border-top-color: var(--red); background: #111; transform: translateY(-2px); }
    .fp-label { font-family: var(--font-display); font-size: 2rem; color: var(--white); letter-spacing: 0.05em; }
    .fp-desc { font-size: 0.58rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px; }
    .fp-preview { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .fp-row-dots { display: flex; gap: 6px; justify-content: center; }
    .fp-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gray); transition: background 0.15s; }
    .formation-card:hover .fp-dot { background: var(--dim); }

    /* ── DRAFT LAYOUT ── */
    .draft-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .formation-active-label { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 0.1em; color: var(--red); }
    .btn-back {
      background: none;
      border: 1px solid var(--gray);
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.12s;
    }
    .btn-back:hover { border-color: var(--white); color: var(--white); }
    .draft-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 800px) { .draft-layout { grid-template-columns: 1fr; } }

    /* ── PITCH ── */
    .pitch {
      background: linear-gradient(180deg, #1b4d30 0%, #1f5736 50%, #1b4d30 100%);
      border: 2px solid #2a6040;
      aspect-ratio: 3 / 4;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }
    .field-lines {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .p-slot {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.38);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.12s;
      gap: 1px;
      user-select: none;
    }
    .p-slot:hover { border-color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.6); }
    .p-slot.compatible { border-style: solid; border-color: #4caf50; background: rgba(76,175,80,0.18); }
    .p-slot.compatible:hover { background: rgba(76,175,80,0.32); }
    .p-slot.incompatible { border-style: solid; border-color: var(--gold); background: rgba(212,160,23,0.1); }
    .p-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.2); background: rgba(10,10,10,0.82); }
    .p-slot.filled:hover { border-color: var(--red); }
    .slot-pos-label { font-family: var(--font-display); font-size: 0.85rem; color: var(--red); line-height: 1; }
    .slot-player-name {
      font-size: 0.58rem; color: var(--white); line-height: 1.1;
      text-align: center; max-width: 58px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .slot-player-rating { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold); line-height: 1; }

    /* ── DRAFT SIDEBAR ── */
    .draft-sidebar { position: sticky; top: 80px; }
    .draft-header { padding-bottom: 12px; border-bottom: 1px solid var(--gray); margin-bottom: 12px; }
    .draft-round { font-family: var(--font-display); font-size: 1.9rem; letter-spacing: 0.1em; }
    .draft-hint { font-size: 0.85rem; color: var(--dim); letter-spacing: 0.06em; margin-top: 4px; min-height: 1.4em; line-height: 1.4; }
    .draft-cards { display: flex; flex-direction: column; gap: 6px; }
    .draft-card {
      background: var(--black);
      border: 1px solid var(--gray);
      border-left: 3px solid var(--gray);
      padding: 10px 10px 10px 12px;
      cursor: pointer;
      position: relative;
      transition: all 0.12s;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      gap: 1px 8px;
    }
    .draft-card:hover { border-left-color: var(--red); background: #141414; }
    .draft-card.selected { border-left-color: var(--gold); background: rgba(212,160,23,0.06); }
    .dc-pos { font-family: var(--font-display); font-size: 0.82rem; color: var(--red); letter-spacing: 0.12em; grid-column: 1; display: flex; align-items: baseline; gap: 6px; }
    .dc-alt { font-size: 0.62rem; color: #999; letter-spacing: 0.08em; font-family: var(--font-mono); }
    .draft-card.slot-match { border-left-color: #4caf50; background: rgba(76,175,80,0.07); }
    .draft-card.slot-dim   { opacity: 0.28; pointer-events: none; }
    .p-slot.slot-active    { border-style: solid; border-color: var(--gold); background: rgba(212,160,23,0.22); }
    .dc-name { font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600; line-height: 1.2; grid-column: 1; }
    .dc-meta { font-size: 0.72rem; color: var(--dim); grid-column: 1; margin-bottom: 4px; }
    .dc-stats { font-size: 0.75rem; color: var(--dim); display: flex; gap: 10px; grid-column: 1; }
    .dc-stats small { font-size: 0.65rem; }
    .dc-rating { font-family: var(--font-display); font-size: 2.2rem; color: var(--dim); grid-column: 2; grid-row: 1 / 4; align-self: center; line-height: 1; }
    .draft-card.selected .dc-rating { color: var(--gold); }
    .draft-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .btn-refresh {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid var(--gray);
      color: var(--dim);
      padding: 9px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-refresh:hover { border-color: var(--white); color: var(--white); }
    .no-cards { font-size: 0.82rem; color: var(--dim); text-align: center; padding: 20px 0; letter-spacing: 0.1em; }

    /* ── SIMULATE BUTTON ── */
    .simulate-area { margin-top: 12px; }
    .btn-simulate {
      width: 100%;
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-simulate:hover { background: #c00016; transform: scale(1.01); }
    .btn-simulate:disabled { background: var(--gray); color: var(--dim); cursor: not-allowed; transform: none; }

    /* ── RESULTS MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--black);
      border: 1px solid var(--gray);
      border-top: 4px solid var(--red);
      max-width: 680px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-top { padding: 28px 28px 20px; border-bottom: 1px solid var(--gray); }
    .result-headline { font-family: var(--font-display); font-size: 3.5rem; letter-spacing: 0.06em; line-height: 1; margin-bottom: 6px; }
    .result-headline.champion { color: var(--gold); }
    .result-headline.europa { color: #4a90d9; }
    .result-headline.mid { color: var(--white); }
    .result-headline.relegated { color: var(--red); }
    .result-sub { font-size: 0.72rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }
    .result-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--gray);
      border: 1px solid var(--gray); margin: 20px 0;
    }
    .result-stat { background: var(--black); padding: 14px 12px; text-align: center; }
    .result-stat-val { font-family: var(--font-display); font-size: 2.2rem; line-height: 1; color: var(--white); }
    .result-stat-label { font-size: 0.6rem; color: var(--dim); letter-spacing: 0.15em; margin-top: 3px; }
    .modal-body { padding: 0 28px 28px; }
    .ticker-title { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; margin: 20px 0 10px; }
    .match-ticker { height: 200px; overflow-y: auto; border: 1px solid var(--gray); background: #080808; }
    .match-row { display: grid; grid-template-columns: 28px 1fr 52px; gap: 8px; padding: 5px 10px; font-size: 0.67rem; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: center; }
    .match-row:last-child { border-bottom: none; }
    .match-md { color: var(--dim); }
    .match-opp { color: var(--white); }
    .match-score { font-weight: 600; text-align: right; }
    .match-score.W { color: #4caf50; }
    .match-score.D { color: var(--gold); }
    .match-score.L { color: var(--red); }
    .squad-recap { margin-top: 18px; }
    .recap-player { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.72rem; }
    .recap-player:last-child { border-bottom: none; }
    .recap-name { font-family: var(--font-serif); font-weight: 600; }
    .recap-detail { color: var(--dim); font-size: 0.63rem; }
    .recap-rating { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold); }
    .modal-footer { padding: 14px 28px; border-top: 1px solid var(--gray); display: flex; gap: 10px; justify-content: flex-end; }
    .btn-close, .btn-reset { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em; padding: 10px 20px; border: 1px solid var(--gray); cursor: pointer; transition: all 0.12s; }
    .btn-close { background: none; color: var(--white); }
    .btn-close:hover { border-color: var(--white); }
    .btn-reset { background: var(--red); color: var(--white); border-color: var(--red); }
    .btn-reset:hover { background: #c00016; }
    .perfect-banner { display: none; text-align: center; padding: 18px; background: linear-gradient(135deg, rgba(212,160,23,0.1), rgba(225,0,26,0.1)); border: 1px solid var(--gold); margin: 16px 0; }
    .perfect-banner.show { display: block; }
    .perfect-text { font-family: var(--font-display); font-size: 2rem; color: var(--gold); letter-spacing: 0.1em; }

    /* ── TEAM DEAL ── */
    .team-deal { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .team-deal-header {
      background: var(--black);
      border: 1px solid var(--gray);
      border-left: 3px solid var(--red);
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .team-era { font-family: var(--font-display); font-size: 2rem; color: var(--white); letter-spacing: 0.06em; line-height: 1; }
    .team-era-sub { font-size: 0.78rem; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .deal-cards { display: flex; flex-direction: column; gap: 5px; }
    .btn-new-team {
      width: 100%;
      font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.1em;
      background: none; border: 1px solid var(--gray); color: var(--dim);
      padding: 8px; cursor: pointer; transition: all 0.12s;
    }
    .btn-new-team:hover { border-color: var(--white); color: var(--white); }

    /* ── SELECTED PLAYER VIEW ── */
    .selected-player-view {
      border: 1px solid var(--gold);
      border-top: 3px solid var(--gold);
      background: rgba(212,160,23,0.05);
      padding: 16px;
      text-align: center;
      margin-bottom: 8px;
    }
    .spv-label { font-size: 0.75rem; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
    .spv-rating { font-family: var(--font-display); font-size: 3.5rem; color: var(--gold); line-height: 1; margin-bottom: 4px; }
    .spv-name { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600; color: var(--white); margin-bottom: 2px; }
    .spv-pos { font-family: var(--font-display); font-size: 1.1rem; color: var(--red); letter-spacing: 0.12em; }
    .spv-meta { font-size: 0.75rem; color: var(--dim); margin-top: 4px; }
    .spv-instruction {
      font-size: 0.85rem; color: var(--white); letter-spacing: 0.04em; line-height: 1.5;
      background: rgba(225,0,26,0.08); border: 1px solid rgba(225,0,26,0.25);
      padding: 10px; margin-top: 12px;
    }
    .btn-cancel-pick {
      width: 100%;
      font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.1em;
      background: none; border: 1px solid var(--gray); color: var(--dim);
      padding: 8px; cursor: pointer; transition: all 0.12s;
    }
    .btn-cancel-pick:hover { border-color: var(--red); color: var(--red); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 2px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .draft-card { animation: fadeSlideIn 0.18s ease both; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg class="eagle-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="29" fill="#0A0A0A" stroke="#E1001A" stroke-width="1.5"/>
      <path d="M30 8 C24 14 14 16 10 22 C16 20 20 22 22 26 C18 28 16 32 18 38 C22 34 26 33 30 35 C34 33 38 34 42 38 C44 32 42 28 38 26 C40 22 44 20 50 22 C46 16 36 14 30 8Z" fill="#E1001A"/>
      <circle cx="30" cy="28" r="4" fill="#0A0A0A"/>
      <path d="M27 28 L30 24 L33 28" fill="#E1001A"/>
    </svg>
    <div class="logo-text">
      <div class="logo-title">34-0</div>
      <div class="logo-sub">Eintracht Frankfurt · Bundesliga</div>
    </div>
  </div>
  <div class="header-right" id="headerRight">
    <strong>SGE</strong>
    Traumelf bauen
  </div>
</header>

<!-- ══════════════════════════════════════════
     SCREEN 1 — FORMATION PICKER
══════════════════════════════════════════ -->
<div class="screen active" id="screenFormation">
  <div class="container">
    <div class="fp-hero">
      <div class="fp-hero-title">WÄHLE DEINE FORMATION</div>
      <div class="fp-hero-sub">Schritt 1 — Taktik festlegen, dann Spieler ziehen</div>
    </div>
    <div class="formation-grid" id="formationGrid"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2 — DRAFT
══════════════════════════════════════════ -->
<div class="screen" id="screenDraft">
  <div class="container">
    <div class="draft-top">
      <span class="formation-active-label" id="formationActiveLabel"></span>
      <button class="btn-back" id="btnBack">← Formation ändern</button>
    </div>
    <div class="draft-layout">

      <!-- PITCH -->
      <div>
        <div class="pitch" id="pitch">
          <svg class="field-lines" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- outer border -->
            <rect x="10" y="10" width="280" height="380" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <!-- center line -->
            <line x1="10" y1="200" x2="290" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <!-- center circle -->
            <circle cx="150" cy="200" r="40" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <circle cx="150" cy="200" r="2.5" fill="rgba(255,255,255,0.2)"/>
            <!-- top penalty area -->
            <rect x="90" y="10" width="120" height="62" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <!-- top 6-yard box -->
            <rect x="120" y="10" width="60" height="22" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <!-- top penalty spot -->
            <circle cx="150" cy="50" r="2" fill="rgba(255,255,255,0.2)"/>
            <!-- bottom penalty area -->
            <rect x="90" y="328" width="120" height="62" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <!-- bottom 6-yard box -->
            <rect x="120" y="368" width="60" height="22" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <!-- bottom penalty spot -->
            <circle cx="150" cy="350" r="2" fill="rgba(255,255,255,0.2)"/>
          </svg>
          <!-- formation slots injected by JS -->
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="draft-sidebar">
        <div class="draft-header">
          <div class="draft-round" id="draftRound">0 / 11</div>
          <div class="draft-hint" id="draftHint">Wähle einen Spieler</div>
        </div>

        <div class="team-deal" id="teamDeal"></div>

        <div class="simulate-area" id="simulateArea" style="display:none;">
          <button class="btn-simulate" id="btnSimulate">SAISON SIMULIEREN</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     RESULTS MODAL
══════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-top">
      <div class="result-headline" id="resultHeadline">—</div>
      <div class="result-sub" id="resultSub">—</div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-val" id="rPts">—</div><div class="result-stat-label">PUNKTE</div></div>
        <div class="result-stat"><div class="result-stat-val" id="rWins">—</div><div class="result-stat-label">SIEGE</div></div>
        <div class="result-stat"><div class="result-stat-val" id="rGD">—</div><div class="result-stat-label">TORDIFF.</div></div>
        <div class="result-stat"><div class="result-stat-val" id="rPos">—</div><div class="result-stat-label">PLATZ</div></div>
      </div>
      <div class="perfect-banner" id="perfectBanner">

      {id:'s3',  pos:'CB', label:'IV',  x:61, y:70},
      {id:'s4',  pos:'CB', label:'IV',  x:39, y:70},
      {id:'s5',  pos:'LB', label:'LV',  x:18, y:70},
      {id:'s6',  pos:'DM', label:'DM',  x:50, y:58},
      {id:'s7',  pos:'RW', label:'MR',  x:80, y:44},
      {id:'s8',  pos:'MF', label:'MF',  x:60, y:44},
      {id:'s9',  pos:'MF', label:'MF',  x:40, y:44},
      {id:'s10', pos:'LW', label:'ML',  x:20, y:44},
      {id:'s11', pos:'CF', label:'ST',  x:50, y:20},
    ]
  }
};

// Which player positions fit which slot positions (compatible = green, else gold)
// Kept deliberately tight — only positions genuinely interchangeable at Bundesliga level.
// Alt positions on individual players handle further historical flexibility.
const POS_COMPAT = {
  GK:  ['GK'],
  RB:  ['RB','CB','LB'],
  CB:  ['CB','RB','LB','DM'],
  LB:  ['LB','CB','RB'],
  DM:  ['DM','CB','MF'],
  MF:  ['MF','DM','AM'],
  AM:  ['AM','MF','RW','LW'],
  RW:  ['RW','AM','LW'],
  LW:  ['LW','AM','RW'],
  CF:  ['CF','AM'],
};
function isCompatible(playerPos, slotPos) {
  return (POS_COMPAT[playerPos] || []).includes(slotPos);
}

// English position codes → German abbreviations used on pitch
const POS_DE = { GK:'TW', RB:'RV', LB:'LV', CB:'IV', DM:'DM', MF:'MF', AM:'OM', RW:'RA', LW:'LA', CF:'ST' };
function posDE(code) { return POS_DE[code] || code; }

// Returns true if player (using main or alt positions) can fill slotPos
function playerFitsSlot(player, slotPos) {
  if (isCompatible(player.position, slotPos)) return true;
  return (player.altPositions || []).some(ap => isCompatible(ap, slotPos));
}

// ── SEASON DATA ────────────────────────────────────────────────────────
// Bundesliga seasons SGE participated in (by start year, gaps = relegation)
const SGE_SEASONS = [
  1963,1964,1965,1966,1967,1968,1969,1970,1971,1972,1973,1974,1975,
  1976,1977,1978,1979,1980,1981,1982,1983,1984,1985,1986,1987,1988,
  1989,1990,1991,1992,1993,1994,1995,
  1998,1999,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,
  2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024
];

function seasonLabel(y) { return `${y}/${String(y + 1).slice(-2)}`; }

function decadeForYear(y) {
  if (y < 1970) return '1960s';
  if (y < 1980) return '1970s';
  if (y < 1990) return '1980s';
  if (y < 2000) return '1990s';
  if (y < 2010) return '2000s';
  if (y < 2020) return '2010s';
  return '2020s';
}

// ── STATE ────────────────────────────────────────────────────────────────
let formationKey  = null;
let slotFills     = {};        // slotId → player
let placedIds     = new Set();
let phase         = 'deal';   // 'deal' | 'place'
let teamYear      = null;      // currently shown season start year
let teamPlayers   = [];        // players in current deal
let selectedCard  = null;      // player chosen from deal
let activeFilterSlot = null;  // slot being filtered during deal phase

// ── DOM REFS ─────────────────────────────────────────────────────────────
const formationGrid      = document.getElementById('formationGrid');
const pitch              = document.getElementById('pitch');
const teamDealEl         = document.getElementById('teamDeal');
const draftRoundEl       = document.getElementById('draftRound');
const draftHintEl        = document.getElementById('draftHint');
const simulateAreaEl     = document.getElementById('simulateArea');
const formationActiveLbl = document.getElementById('formationActiveLabel');
const btnBack            = document.getElementById('btnBack');
const btnSimulate        = document.getElementById('btnSimulate');
const modalOverlay       = document.getElementById('modalOverlay');
const btnClose           = document.getElementById('btnClose');
const btnReset           = document.getElementById('btnReset');
const headerRight        = document.getElementById('headerRight');

// ── SCREEN MANAGEMENT ────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── FORMATION PICKER ─────────────────────────────────────────────────────
function buildFormationGrid() {
  formationGrid.innerHTML = '';
  Object.entries(FORMATIONS).forEach(([key, f]) => {
    const card = document.createElement('div');
    card.className = 'formation-card';
    const dotsHtml = f.rows.map(n =>
      `<div class="fp-row-dots">${'<span class="fp-dot"></span>'.repeat(n)}</div>`
    ).join('');
    card.innerHTML = `
      <div class="fp-label">${f.label}</div>
      <div class="fp-desc">${f.desc}</div>
      <div class="fp-preview">${dotsHtml}</div>
    `;
    card.addEventListener('click', () => startDraft(key));
    formationGrid.appendChild(card);
  });
}

// ── START DRAFT ───────────────────────────────────────────────────────────
function startDraft(key) {
  formationKey  = key;
  slotFills     = {};
  placedIds     = new Set();
  selectedCard  = null;
  phase         = 'deal';

  const f = FORMATIONS[key];
  formationActiveLbl.textContent = `${f.label} — ${f.desc}`;
  headerRight.innerHTML = `<strong id="headerCount">0 / 11</strong> Spieler gesetzt`;

  showScreen('screenDraft');
  buildPitch();
  dealNewTeam();
  updateStatus();
}

// ── PITCH ─────────────────────────────────────────────────────────────────
function buildPitch() {
  pitch.querySelectorAll('.p-slot').forEach(el => el.remove());
  FORMATIONS[formationKey].slots.forEach(slot => {
    const el = document.createElement('div');
    el.className = 'p-slot';
    el.id = 'slot-' + slot.id;
    el.style.left = slot.x + '%';
    el.style.top  = slot.y + '%';
    el.dataset.slotId = slot.id;
    el.innerHTML = `<span class="slot-pos-label">${slot.label}</span>`;
    el.addEventListener('click', () => handleSlotClick(slot.id));
    pitch.appendChild(el);
  });
}

function renderPitch() {
  FORMATIONS[formationKey].slots.forEach(slot => {
    const el = document.getElementById('slot-' + slot.id);
    if (!el) return;
    const player = slotFills[slot.id];
    el.classList.remove('filled','compatible','incompatible','slot-active');

    if (player) {
      el.classList.add('filled');
      const lastName = player.name.split(' ').pop();
      el.innerHTML = `
        <span class="slot-pos-label">${slot.label}</span>
        <span class="slot-player-name">${lastName}</span>
        <span class="slot-player-rating">${player.rating}</span>
      `;
    } else {
      if (phase === 'place' && selectedCard) {
        el.classList.add(playerFitsSlot(selectedCard, slot.pos) ? 'compatible' : 'incompatible');
      } else if (phase === 'deal' && activeFilterSlot === slot.id) {
        el.classList.add('slot-active');
      }
      el.innerHTML = `<span class="slot-pos-label">${slot.label}</span>`;
    }
  });
}

function handleSlotClick(slotId) {
  if (phase === 'deal') {
    // Toggle position filter — clicking same slot again clears it
    activeFilterSlot = (activeFilterSlot === slotId) ? null : slotId;
    renderPitch();
    renderSidebar();
    return;
  }
  if (phase !== 'place' || !selectedCard) return;
  const existing = slotFills[slotId];
  if (existing) placedIds.delete(existing.id);

  slotFills[slotId] = selectedCard;
  placedIds.add(selectedCard.id);
  selectedCard = null;
  phase = 'deal';
  activeFilterSlot = null;

  renderPitch();
  updateStatus();

  if (getEmptyCount() > 0) dealNewTeam();
}

// ── TEAM DEAL ─────────────────────────────────────────────────────────────
function dealNewTeam() {
  // Build pools: seasons with enough available players
  const viable = SGE_SEASONS.filter(y =>
    PLAYERS.filter(p => p.activeFrom <= y && p.activeTo >= y && !placedIds.has(p.id)).length >= 5
  );
  const fallback = SGE_SEASONS.filter(y =>
    PLAYERS.filter(p => p.activeFrom <= y && p.activeTo >= y && !placedIds.has(p.id)).length >= 1
  );

  const pool = viable.length > 0 ? viable : fallback;
  if (pool.length === 0) return;

  // Diversity bias: prefer decades not yet in squad
  const usedDecades = new Set(Object.values(slotFills).map(p => p.decade));
  const biased = pool.filter(y => !usedDecades.has(decadeForYear(y)));
  const chooseFrom = (biased.length > 0 && Math.random() < 0.65) ? biased : pool;

  teamYear     = chooseFrom[Math.floor(Math.random() * chooseFrom.length)];
  teamPlayers  = PLAYERS.filter(p => p.activeFrom <= teamYear && p.activeTo >= teamYear && !placedIds.has(p.id));
  phase        = 'deal';
  selectedCard = null;
  activeFilterSlot = null;
  renderSidebar();
  renderPitch();
}

function renderSidebar() {
  if (phase === 'deal') {
    const label = teamYear ? `Saison ${seasonLabel(teamYear)}` : '—';

    let html = `
      <div class="team-deal-header">
        <div class="team-era">${label}</div>
        <div class="team-era-sub">Eintracht Frankfurt · Saisonkader</div>
      </div>
      <div class="deal-cards">
    `;
    // Determine which slot is being filtered and find its slotPos
    let filterSlotPos = null;
    if (activeFilterSlot) {
      const slots = FORMATIONS[formationKey]?.slots || [];
      const fs = slots.find(s => s.id === activeFilterSlot);
      if (fs) filterSlotPos = fs.pos;
    }

    teamPlayers.forEach((p, i) => {
      const altStr = p.altPositions && p.altPositions.length
        ? `<span class="dc-alt">· ${p.altPositions.map(posDE).join(' ')}</span>` : '';
      let filterClass = '';
      if (filterSlotPos) {
        filterClass = playerFitsSlot(p, filterSlotPos) ? ' slot-match' : ' slot-dim';
      }
      html += `
        <div class="draft-card${filterClass}" data-pid="${p.id}" style="animation-delay:${i * 0.04}s">
          <div class="dc-pos">${posDE(p.position)}${altStr}</div>
          <div class="dc-name">${p.name}</div>
          <div class="dc-meta">${p.nationality} · ${p.peakSeason || p.years}</div>
          <div class="dc-stats">
            <span>${p.bundesligaGoals} <small>Tore</small></span>
            <span>${p.bundesligaApps} <small>Sp.</small></span>
          </div>
          <div class="dc-rating">${p.rating}</div>
        </div>
      `;
    });
    html += `</div><button class="btn-new-team" id="btnNewTeam">↻ Anderes Team</button>`;

    teamDealEl.innerHTML = html;

    teamDealEl.querySelectorAll('.draft-card:not(.slot-dim)').forEach(card => {
      card.addEventListener('click', () => {
        const player = PLAYERS.find(p => p.id === card.dataset.pid);
        if (player) pickPlayer(player);
      });
    });
    document.getElementById('btnNewTeam').addEventListener('click', dealNewTeam);

  } else {
    // phase === 'place': show selected player prominently
    const p = selectedCard;
    teamDealEl.innerHTML = `
      <div class="selected-player-view">
        <div class="spv-label">Ausgewählt</div>
        <div class="spv-rating">${p.rating}</div>
        <div class="spv-name">${p.name}</div>
        <div class="spv-pos">${posDE(p.position)} — ${p.positionLabel}${p.altPositions && p.altPositions.length ? `<br><span style="font-size:0.75rem;color:var(--dim);letter-spacing:0.08em;">auch: ${p.altPositions.map(posDE).join(' · ')}</span>` : ''}</div>
        <div class="spv-meta">${p.nationality} · ${p.peakSeason || p.years}</div>
        <div class="spv-instruction">Klicke jetzt auf einen freien Platz im Feld um diesen Spieler zu platzieren</div>
      </div>
      <button class="btn-cancel-pick" id="btnCancelPick">← Andere Wahl</button>
    `;
    document.getElementById('btnCancelPick').addEventListener('click', () => {
      phase            = 'deal';
      selectedCard     = null;
      activeFilterSlot = null;
      renderSidebar();
      renderPitch();
      updateStatus();
    });
  }
}

function pickPlayer(player) {
  selectedCard = player;
  phase        = 'place';
  renderSidebar();
  renderPitch();
  updateStatus();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getNeededPositions() {
  const filled = new Set(Object.keys(slotFills));
  return FORMATIONS[formationKey].slots.filter(s => !filled.has(s.id)).map(s => s.pos);
}
function getEmptyCount() { return 11 - Object.keys(slotFills).length; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateStatus() {
  const filled = Object.keys(slotFills).length;
  const done   = filled === 11;

  draftRoundEl.textContent = `${filled} / 11`;
  const countEl = document.getElementById('headerCount');
  if (countEl) countEl.textContent = `${filled} / 11`;

  teamDealEl.style.display    = done ? 'none' : '';
  simulateAreaEl.style.display = done ? 'block' : 'none';

  if (done) {
    draftHintEl.textContent = 'Mannschaft vollständig — bereit zur Simulation!';
  } else if (phase === 'place') {
    draftHintEl.textContent = `${selectedCard.name} — Klicke auf einen Platz im Feld`;
  } else {
    draftHintEl.textContent = 'Wähle einen Spieler aus dem Kader';
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
btnBack.addEventListener('click', () => {
  showScreen('screenFormation');
  formationKey = null;
  headerRight.innerHTML = `<strong>SGE</strong> Traumelf bauen`;
});

// ── SIMULATE ──────────────────────────────────────────────────────────────
btnSimulate.addEventListener('click', () => {
  const formation = FORMATIONS[formationKey];
  const squad = Object.entries(slotFills)
    .filter(([, p]) => p)
    .map(([slotId, player]) => {
      const slot = formation.slots.find(s => s.id === slotId);
      const fits = slot ? playerFitsSlot(player, slot.pos) : true;
      return { ...player, inPosition: fits, slotPos: slot ? slot.pos : player.position };
    });
  showResults(simulateSeason(squad));
});

function showResults(result) {
  let headline, cls, sub;
  if (result.isPerfect) {
    headline = '34 – 0'; cls = 'champion';
    sub = 'PERFEKTE SAISON · MEISTER · DIE ADLER SIND UNBEZWINGBAR';
    document.getElementById('perfectBanner').classList.add('show');
  } else if (result.isChampion) {
    headline = `${result.wins}–${result.losses}`; cls = 'champion';
    sub = `BUNDESLIGA-MEISTER · ${result.points} PUNKTE · PLATZ 1`;
    document.getElementById('perfectBanner').classList.remove('show');
  } else if (result.isEuropa) {
    headline = `${result.wins}–${result.losses}`; cls = 'europa';
    sub = `EUROPACUP · ${result.points} PUNKTE · PLATZ ${result.position}`;
    document.getElementById('perfectBanner').classList.remove('show');
  } else if (result.isRelegated) {
    headline = `${result.wins}–${result.losses}`; cls = 'relegated';
    sub = `ABSTIEG · ${result.points} PUNKTE · PLATZ ${result.position}`;
    document.getElementById('perfectBanner').classList.remove('show');
  } else {
    headline = `${result.wins}–${result.losses}`; cls = 'mid';
    sub = `${result.points} PUNKTE · PLATZ ${result.position} · MITTELFELD`;
    document.getElementById('perfectBanner').classList.remove('show');
  }

  document.getElementById('resultHeadline').textContent = headline;
  document.getElementById('resultHeadline').className   = `result-headline ${cls}`;
  document.getElementById('resultSub').textContent      = sub;
  document.getElementById('rPts').textContent           = result.points;
  document.getElementById('rWins').textContent          = result.wins;
  document.getElementById('rGD').textContent            = (result.goalDifference >= 0 ? '+' : '') + result.goalDifference;
  document.getElementById('rPos').textContent           = result.position === 1 ? '🥇 1.' : result.position + '.';

  const ticker = document.getElementById('matchTicker');
  ticker.innerHTML = '';
  result.games.forEach(g => {
    const row = document.createElement('div');
    row.className = 'match-row';
    row.innerHTML = `
      <span class="match-md">${g.matchday}</span>
      <span class="match-opp">${g.opponent}</span>
      <span class="match-score ${g.result}">${g.gf}:${g.ga}</span>
    `;
    ticker.appendChild(row);
  });

  const recap = document.getElementById('squadRecap');
  recap.innerHTML = '';
  Object.entries(slotFills).forEach(([slotId, p]) => {
    const slot = FORMATIONS[formationKey].slots.find(s => s.id === slotId);
    const row  = document.createElement('div');
    row.className = 'recap-player';
    row.innerHTML = `
      <div>
        <div class="recap-name">${p.name}</div>
        <div class="recap-detail">${slot ? slot.label : p.position} · ${p.years}</div>
      </div>
      <div class="recap-rating">${p.rating}</div>
    `;
    recap.appendChild(row);
  });

  modalOverlay.classList.add('open');
}

btnClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
btnReset.addEventListener('click', () => {
  modalOverlay.classList.remove('open');
  showScreen('screenFormation');
  formationKey = null;
  headerRight.innerHTML = `<strong>SGE</strong> Traumelf bauen`;
});
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('open');
});

// ── INIT ──────────────────────────────────────────────────────────────────
buildFormationGrid();
</script>
