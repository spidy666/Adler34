<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>34-0 — Build the Greatest SGE XI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:   #E1001A;
      --black: #0A0A0A;
      --white: #F4F1EB;
      --gray:  #2A2A2A;
      --dim:   #6B6B6B;
      --gold:  #D4A017;
      --green: #2D7A3A;
      --screen-bg: #0F0F0F;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-serif:   'Source Serif 4', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--screen-bg);
      color: var(--white);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 2px solid var(--red);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--black);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .eagle-svg { width: 42px; height: 42px; }
    .logo-text { line-height: 1; }
    .logo-title { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 0.08em; color: var(--red); }
    .logo-sub { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
    .header-right { text-align: right; font-size: 0.7rem; color: var(--dim); letter-spacing: 0.12em; }
    .header-right strong { display: block; font-size: 1.1rem; color: var(--white); font-family: var(--font-display); letter-spacing: 0.1em; }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── FORMATION PICKER ── */
    .fp-hero {
      text-align: center;
      margin-bottom: 36px;
      padding-top: 12px;
    }
    .fp-hero-title {
      font-family: var(--font-display);
      font-size: 3rem;
      letter-spacing: 0.1em;
      color: var(--white);
    }
    .fp-hero-sub {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .formation-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 740px;
      margin: 0 auto;
    }
    @media (max-width: 580px) { .formation-grid { grid-template-columns: repeat(2, 1fr); } }
    .mode-switcher { display: flex; gap: 10px; justify-content: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--gray); }
    .mode-btn { padding: 9px 28px; border: 1px solid var(--gray); background: none; color: var(--dim); font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
    .mode-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
    .mode-btn:not(.active):hover { border-color: var(--white); color: var(--white); }
    .formation-card {
      background: var(--black);
      border: 1px solid var(--gray);
      border-top: 3px solid var(--gray);
      padding: 18px 14px 14px;
      cursor: pointer;
      text-align: center;
      transition: border-top-color 0.15s, background 0.15s, transform 0.12s;
    }
    .formation-card:hover { border-top-color: var(--red); background: #111; transform: translateY(-2px); }
    .fp-label { font-family: var(--font-display); font-size: 2rem; color: var(--white); letter-spacing: 0.05em; }
    .fp-desc { font-size: 0.58rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px; }
    .fp-preview { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .fp-row-dots { display: flex; gap: 6px; justify-content: center; }
    .fp-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gray); transition: background 0.15s; }
    .formation-card:hover .fp-dot { background: var(--dim); }

    /* ── DRAFT LAYOUT ── */
    .draft-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .formation-active-label { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 0.1em; color: var(--red); }
    .btn-back {
      background: none;
      border: 1px solid var(--gray);
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.12s;
    }
    .btn-back:hover { border-color: var(--white); color: var(--white); }
    .draft-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 800px) { .draft-layout { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .p-slot { width: 64px; height: 64px; gap: 1px; }
      .slot-pos-label { font-size: 0.85rem; }
      .slot-player-name { font-size: 0.58rem; max-width: 58px; }
      .slot-player-rating { font-size: 1.1rem; }
    }

    /* ── PITCH ── */
    .pitch {
      background: linear-gradient(180deg, #1b4d30 0%, #1f5736 50%, #1b4d30 100%);
      border: 2px solid #2a6040;
      aspect-ratio: 3 / 4;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }
    .field-lines {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .p-slot {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 128px; height: 128px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.38);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.12s;
      gap: 2px;
      user-select: none;
    }
    .p-slot:hover { border-color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.6); }
    .p-slot.compatible { border-style: solid; border-color: #4caf50; background: rgba(76,175,80,0.18); }
    .p-slot.compatible:hover { background: rgba(76,175,80,0.32); }
    .p-slot.alt-compat { border-style: solid; border-color: var(--gold); background: rgba(212,160,23,0.1); }
    .p-slot.alt-compat:hover { background: rgba(212,160,23,0.2); }
    .p-slot.incompatible { border-style: solid; border-color: #e53935; background: rgba(229,57,53,0.1); }
    .p-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.2); background: rgba(10,10,10,0.82); }
    .p-slot.filled:hover { border-color: var(--red); }
    .slot-pos-label { font-family: var(--font-display); font-size: 1.05rem; color: var(--red); line-height: 1; }
    .slot-player-name {
      font-size: 0.72rem; color: var(--white); line-height: 1.1;
      text-align: center; max-width: 96px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .slot-player-rating { font-family: var(--font-display); font-size: 1.4rem; color: var(--gold); line-height: 1; }

    /* ── DRAFT SIDEBAR ── */
    .draft-sidebar { position: sticky; top: 80px; }
    .draft-header { padding-bottom: 12px; border-bottom: 1px solid var(--gray); margin-bottom: 12px; }
    .draft-round { font-family: var(--font-display); font-size: 1.9rem; letter-spacing: 0.1em; }
    .draft-hint { font-size: 0.85rem; color: var(--dim); letter-spacing: 0.06em; margin-top: 4px; min-height: 1.4em; line-height: 1.4; }
    .draft-cards { display: flex; flex-direction: column; gap: 6px; }
    .draft-card {
      background: var(--black);
      border: 1px solid var(--gray);
      border-left: 3px solid var(--gray);
      padding: 10px 10px 10px 12px;
      cursor: pointer;
      position: relative;
      transition: all 0.12s;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      gap: 1px 8px;
    }
    .draft-card:hover { border-left-color: var(--red); background: #141414; }
    .draft-card.selected { border-left-color: var(--gold); background: rgba(212,160,23,0.06); }
    .dc-pos { font-family: var(--font-display); font-size: 0.82rem; color: var(--red); letter-spacing: 0.12em; grid-column: 1; display: flex; align-items: baseline; gap: 6px; }
    .dc-alt { font-size: 0.62rem; color: #999; letter-spacing: 0.08em; font-family: var(--font-mono); }
    .draft-card.slot-match { border-left-color: #4caf50; background: rgba(76,175,80,0.07); }
    .draft-card.slot-alt   { border-left-color: var(--gold); background: rgba(212,160,23,0.05); }
    .draft-card.slot-dim   { opacity: 0.28; pointer-events: none; }
    .p-slot.slot-active    { border-style: solid; border-color: var(--gold); background: rgba(212,160,23,0.22); }
    .dc-name { font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600; line-height: 1.2; grid-column: 1; }
    .dc-meta { font-size: 0.72rem; color: var(--dim); grid-column: 1; margin-bottom: 4px; }
    .dc-stats { font-size: 0.75rem; color: var(--dim); display: flex; gap: 10px; grid-column: 1; }
    .dc-stats small { font-size: 0.65rem; }
    .dc-rating { font-family: var(--font-display); font-size: 2.2rem; color: var(--dim); grid-column: 2; grid-row: 1 / 4; align-self: center; line-height: 1; }
    .draft-card.selected .dc-rating { color: var(--gold); }
    .draft-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .btn-refresh {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid var(--gray);
      color: var(--dim);
      padding: 9px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-refresh:hover { border-color: var(--white); color: var(--white); }
    .no-cards { font-size: 0.82rem; color: var(--dim); text-align: center; padding: 20px 0; letter-spacing: 0.1em; }

    /* ── SIMULATE BUTTON ── */
    .simulate-area { margin-top: 12px; }
    .btn-simulate {
      width: 100%;
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-simulate:hover { background: #c00016; transform: scale(1.01); }
    .btn-simulate:disabled { background: var(--gray); color: var(--dim); cursor: not-allowed; transform: none; }

    /* ── RESULTS MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--black);
      border: 1px solid var(--gray);
      border-top: 4px solid var(--red);
      max-width: 680px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-top { padding: 28px 28px 20px; border-bottom: 1px solid var(--gray); }
    .result-headline { font-family: var(--font-display); font-size: 3.5rem; letter-spacing: 0.06em; line-height: 1; margin-bottom: 6px; }
    .result-headline.champion { color: var(--gold); }
    .result-headline.europa { color: #4a90d9; }
    .result-headline.mid { color: var(--white); }
    .result-headline.relegated { color: var(--red); }
    .result-sub { font-size: 0.72rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }
    .result-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--gray);
      border: 1px solid var(--gray); margin: 20px 0;
    }
    .result-stat { background: var(--black); padding: 14px 12px; text-align: center; }
    .result-stat-val { font-family: var(--font-display); font-size: 2.2rem; line-height: 1; color: var(--white); }
    .result-stat-label { font-size: 0.6rem; color: var(--dim); letter-spacing: 0.15em; margin-top: 3px; }
    .modal-body { padding: 0 28px 28px; }
    .ticker-title { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; margin: 20px 0 10px; }
    .match-ticker { height: 200px; overflow-y: auto; border: 1px solid var(--gray); background: #080808; }
    .match-row { display: grid; grid-template-columns: 28px 20px 1fr 52px; gap: 8px; padding: 5px 10px; font-size: 0.67rem; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: center; }
    .match-row:last-child { border-bottom: none; }
    .match-md { color: var(--dim); }
    .match-ha { font-size: 0.58rem; letter-spacing: 0.05em; text-align: center; }
    .match-ha.home { color: var(--white); }
    .match-ha.away { color: var(--dim); }
    .match-opp { color: var(--white); }
    .match-score { font-weight: 600; text-align: right; }
    .match-score.W { color: #4caf50; }
    .match-score.D { color: var(--gold); }
    .match-score.L { color: var(--red); }
    .match-scorers { grid-column: 2 / 5; font-size: 0.58rem; color: var(--gold); opacity: 0.65; padding-bottom: 3px; }
    .recap-goals { font-size: 0.65rem; color: var(--gold); opacity: 0.75; margin-top: 2px; }
    .squad-recap { margin-top: 18px; }
    .recap-player { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.72rem; }
    .recap-player:last-child { border-bottom: none; }
    .recap-name { font-family: var(--font-serif); font-weight: 600; }
    .recap-detail { color: var(--dim); font-size: 0.63rem; }
    .recap-rating { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold); }
    .modal-footer { padding: 14px 28px; border-top: 1px solid var(--gray); display: flex; gap: 10px; justify-content: flex-end; }
    .btn-close, .btn-reset { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em; padding: 10px 20px; border: 1px solid var(--gray); cursor: pointer; transition: all 0.12s; }
    .btn-close { background: none; color: var(--white); }
    .btn-close:hover { border-color: var(--white); }
    .btn-reset { background: var(--red); color: var(--white); border-color: var(--red); }
    .btn-reset:hover { background: #c00016; }
    .perfect-banner { display: none; text-align: center; padding: 18px; background: linear-gradient(135deg, rgba(212,160,23,0.1), rgba(225,0,26,0.1)); border: 1px solid var(--gold); margin: 16px 0; }
    .perfect-banner.show { display: block; }
    .perfect-text { font-family: var(--font-display); font-size: 2rem; color: var(--gold); letter-spacing: 0.1em; }
    /* animation states */
    .match-ticker.animating { height: 420px; }
    .modal-top.hidden { display: none; }
    @keyframes rowAppear { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
    .match-row.appear { animation: rowAppear 0.3s ease-out; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-top.revealed { animation: fadeSlideIn 0.45s ease-out; }
    /* squad popup */
    .btn-squad { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em; padding: 10px 20px; cursor: pointer; transition: all 0.12s; background: none; color: var(--gold); border: 1px solid var(--gold); }
    .btn-squad:hover { background: rgba(212,160,23,0.12); }
    .btn-debug { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em; padding: 10px 20px; cursor: pointer; background: none; color: var(--dim); border: 1px dashed var(--gray); transition: all 0.12s; margin-right: auto; }
    .btn-debug:hover { color: var(--white); border-color: var(--white); border-style: solid; }
    .debug-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.80); z-index: 1300; align-items: center; justify-content: center; padding: 20px; }
    .debug-overlay.open { display: flex; }
    .debug-popup { background: var(--black); border: 1px solid var(--gray); border-top: 3px solid var(--dim); max-width: 720px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
    .debug-popup-top { padding: 10px 16px; border-bottom: 1px solid var(--gray); font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.12em; color: var(--dim); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .btn-copy-debug { font-family: var(--font-mono); font-size: 0.65rem; padding: 4px 10px; cursor: pointer; background: none; color: var(--dim); border: 1px solid var(--gray); transition: all 0.12s; letter-spacing: 0.08em; }
    .btn-copy-debug:hover { color: var(--white); border-color: var(--white); }
    .debug-popup-close { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 1rem; padding: 0 4px; transition: color 0.12s; }
    .debug-popup-close:hover { color: var(--white); }
    .debug-textarea { flex: 1; background: #050505; color: #8a8a8a; border: none; padding: 14px 16px; font-family: var(--font-mono); font-size: 0.62rem; line-height: 1.65; resize: none; outline: none; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
    .squad-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .squad-overlay.open { opacity: 1; pointer-events: all; }
    .squad-popup { background: var(--black); border: 1px solid var(--gray); border-top: 4px solid var(--gold); max-width: 480px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; transform: translateY(20px); transition: transform 0.25s; }
    .squad-overlay.open .squad-popup { transform: translateY(0); }
    .squad-popup-top { padding: 20px 24px 16px; border-bottom: 1px solid var(--gray); font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.15em; }
    .squad-popup-body { padding: 16px 24px; overflow-y: auto; flex: 1; }
    .squad-popup-footer { padding: 12px 24px; border-top: 1px solid var(--gray); display: flex; justify-content: flex-end; }

    /* ── TEAM DEAL ── */
    .team-deal { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .team-deal-header {
      background: var(--black);
      border: 1px solid var(--gray);
      border-left: 3px solid var(--red);
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .team-era { font-family: var(--font-display); font-size: 2rem; color: var(--white); letter-spacing: 0.06em; line-height: 1; }
    .team-era-sub { font-size: 0.78rem; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .deal-cards { display: flex; flex-direction: column; gap: 5px; }
    .btn-new-team {
      width: 100%;
      font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.1em;
      background: none; border: 1px solid var(--gray); color: var(--dim);
      padding: 8px; cursor: pointer; transition: all 0.12s;
    }
    .btn-new-team:hover { border-color: var(--white); color: var(--white); }

    /* ── SELECTED PLAYER VIEW ── */
    .selected-player-view {
      border: 1px solid var(--gold);
      border-top: 3px solid var(--gold);
      background: rgba(212,160,23,0.05);
      padding: 16px;
      text-align: center;
      margin-bottom: 8px;
    }
    .spv-label { font-size: 0.75rem; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
    .spv-rating { font-family: var(--font-display); font-size: 3.5rem; color: var(--gold); line-height: 1; margin-bottom: 4px; }
    .spv-name { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600; color: var(--white); margin-bottom: 2px; }
    .spv-pos { font-family: var(--font-display); font-size: 1.1rem; color: var(--red); letter-spacing: 0.12em; }
    .spv-meta { font-size: 0.75rem; color: var(--dim); margin-top: 4px; }
    .spv-instruction {
      font-size: 0.85rem; color: var(--white); letter-spacing: 0.04em; line-height: 1.5;
      background: rgba(225,0,26,0.08); border: 1px solid rgba(225,0,26,0.25);
      padding: 10px; margin-top: 12px;
    }
    .btn-cancel-pick {
      width: 100%;
      font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.1em;
      background: none; border: 1px solid var(--gray); color: var(--dim);
      padding: 8px; cursor: pointer; transition: all 0.12s;
    }
    .btn-cancel-pick:hover { border-color: var(--red); color: var(--red); }

    /* ── INFO BUTTON ── */

function flagImg(natStr) {
  const m = natStr.match(/([\u{1F1E6}-\u{1F1FF}]{2})(.*)/u);
  if (!m) return natStr;
  const cc = [...m[1]].map(c => String.fromCodePoint(c.codePointAt(0) - 0x1F1E6 + 65)).join('').toLowerCase();
  return `<img src="https://flagcdn.com/16x12/${cc}.png" width="16" height="12" alt="${cc.toUpperCase()}" style="vertical-align:middle;margin-right:4px;">${m[2].trim()}`;

  if (player.position === slotPos) return 'main';
  if ((player.altPositions || []).includes(slotPos)) return 'alt';
  return 'out';

  showScreen('screenDraft');
  buildPitch();
  dealNewTeam();
  updateStatus();
}

// ── PITCH ─────────────────────────────────────────────────────────────────
function buildPitch() {
  pitch.querySelectorAll('.p-slot').forEach(el => el.remove());
  FORMATIONS[formationKey].slots.forEach(slot => {
    const el = document.createElement('div');
    el.className = 'p-slot';
    el.id = 'slot-' + slot.id;
    el.style.left = slot.x + '%';
    el.style.top  = slot.y + '%';
    el.dataset.slotId = slot.id;
    el.innerHTML = `<span class="slot-pos-label">${slot.label}</span>`;
    el.addEventListener('click', () => handleSlotClick(slot.id));
    pitch.appendChild(el);
  });
}

function renderPitch() {
  FORMATIONS[formationKey].slots.forEach(slot => {
    const el = document.getElementById('slot-' + slot.id);
    if (!el) return;
    const player = slotFills[slot.id];
    el.classList.remove('filled','compatible','alt-compat','incompatible','slot-active');

    if (player) {
      el.classList.add('filled');
      const lastName = player.name.split(' ').pop();
      el.innerHTML = `
        <span class="slot-pos-label">${slot.label}</span>
        <span class="slot-player-name">${lastName}</span>
        <span class="slot-player-rating">${player.rating}</span>
      `;
    } else {
      if (phase === 'place' && selectedCard) {
        const fit = playerFitLevel(selectedCard, slot.pos);
        el.classList.add(fit === 'main' ? 'compatible' : fit === 'alt' ? 'alt-compat' : 'incompatible');
      } else if (phase === 'deal' && activeFilterSlot === slot.id) {
        el.classList.add('slot-active');
      }
      el.innerHTML = `<span class="slot-pos-label">${slot.label}</span>`;
    }
  });
}

function handleSlotClick(slotId) {
  if (phase === 'deal') {
    // Toggle position filter — clicking same slot again clears it
    activeFilterSlot = (activeFilterSlot === slotId) ? null : slotId;
    renderPitch();
    renderSidebar();
    return;
  }
  if (phase !== 'place' || !selectedCard) return;
  const existing = slotFills[slotId];
  if (existing) placedIds.delete(existing.id);

  slotFills[slotId] = selectedCard;
  placedIds.add(selectedCard.id);
  selectedCard = null;
  phase = 'deal';
  activeFilterSlot = null;

  renderPitch();
  updateStatus();

  if (getEmptyCount() > 0) dealNewTeam();
}

// ── TEAM DEAL ─────────────────────────────────────────────────────────────
const ALL_DECADES = ['1960s','1970s','1980s','1990s','2000s','2010s','2020s'];

function dealNewTeam() {
  const deckPool = d => activePlayers.filter(p => p.decade === d && !placedIds.has(p.id));

  // Prefer decades with 5+ unplaced players; fall back to any non-empty decade
  const viable   = ALL_DECADES.filter(d => deckPool(d).length >= 5);
  const fallback = ALL_DECADES.filter(d => deckPool(d).length >= 1);
  const eligible = viable.length > 0 ? viable : fallback;
  if (eligible.length === 0) return;

  // Diversity bias: prefer decades not yet represented in the squad
  const usedDecades = new Set(Object.values(slotFills).filter(Boolean).map(p => p.decade));
  const biased      = eligible.filter(d => !usedDecades.has(d));
  const chooseFrom  = (biased.length > 0 && Math.random() < 0.65) ? biased : eligible;

  teamDecade = chooseFrom[Math.floor(Math.random() * chooseFrom.length)];

  // Randomly sample 13 players from the chosen decade, then sort by position
  const pool     = deckPool(teamDecade);
  const shuffled = pool.slice().sort(() => Math.random() - 0.5);
  teamPlayers    = shuffled.slice(0, 13)
    .sort((a, b) => (POS_ORDER[a.position] ?? 5) - (POS_ORDER[b.position] ?? 5));
  phase        = 'deal';
  selectedCard = null;
  activeFilterSlot = null;
  renderSidebar();
  renderPitch();
}

function renderSidebar() {
  if (phase === 'deal') {
    let label = '—';
    if (teamPlayers.length > 0) {
      const minYear = Math.min(...teamPlayers.map(p => p.activeFrom));
      const maxYear = Math.max(...teamPlayers.map(p => p.activeTo));
      label = `${seasonLabel(minYear)} – ${seasonLabel(maxYear - 1)}`;
    }

    let html = `
      <div class="team-deal-header">
        <div class="team-era">${label}</div>
        <div class="team-era-sub">Eintracht Frankfurt · Kader dieser Ära</div>
      </div>
      <div class="deal-cards">
    `;
    // Determine which slot is being filtered and find its slotPos
    let filterSlotPos = null;
    if (activeFilterSlot) {
      const slots = FORMATIONS[formationKey]?.slots || [];
      const fs = slots.find(s => s.id === activeFilterSlot);
      if (fs) filterSlotPos = fs.pos;
    }

    teamPlayers.forEach((p, i) => {
      const altStr = p.altPositions && p.altPositions.length
        ? `<span class="dc-alt">· ${p.altPositions.map(posDE).join(' ')}</span>` : '';
      let filterClass = '';
      if (filterSlotPos) {
        const fit = playerFitLevel(p, filterSlotPos);
        filterClass = fit === 'main' ? ' slot-match' : fit === 'alt' ? ' slot-alt' : ' slot-dim';
      }
      html += `
        <div class="draft-card${filterClass}" data-pid="${p.id}" style="animation-delay:${i * 0.04}s">
          <div class="dc-pos">${posDE(p.position)}${altStr}</div>
          <div class="dc-name">${p.name}</div>
          <div class="dc-meta">${flagImg(p.nationality)} · ${p.peakSeason || p.years}</div>
          <div class="dc-stats">
            <span>${p.bundesligaGoals} <small>Tore</small></span>
            <span>${p.bundesligaApps} <small>Sp.</small></span>
          </div>
          <div class="dc-rating">${p.rating}</div>
        </div>
      `;
    });
    html += `</div><button class="btn-new-team" id="btnNewTeam">↻ Anderes Team</button>`;

    teamDealEl.innerHTML = html;

    teamDealEl.querySelectorAll('.draft-card:not(.slot-dim)').forEach(card => {
      card.addEventListener('click', () => {
        const player = activePlayers.find(p => p.id === card.dataset.pid);
        if (player) pickPlayer(player);
      });
    });
    document.getElementById('btnNewTeam').addEventListener('click', dealNewTeam);

  } else {
    // phase === 'place': show selected player prominently
    const p = selectedCard;
    teamDealEl.innerHTML = `
      <div class="selected-player-view">
        <div class="spv-label">Ausgewählt</div>
        <div class="spv-rating">${p.rating}</div>
        <div class="spv-name">${p.name}</div>
        <div class="spv-pos">${posDE(p.position)} — ${p.positionLabel}${p.altPositions && p.altPositions.length ? `<br><span style="font-size:0.75rem;color:var(--dim);letter-spacing:0.08em;">auch: ${p.altPositions.map(posDE).join(' · ')}</span>` : ''}</div>
        <div class="spv-meta">${flagImg(p.nationality)} · ${p.peakSeason || p.years}</div>
        <div class="spv-instruction">Klicke jetzt auf einen freien Platz im Feld um diesen Spieler zu platzieren</div>
      </div>
      <button class="btn-cancel-pick" id="btnCancelPick">← Andere Wahl</button>
    `;
    document.getElementById('btnCancelPick').addEventListener('click', () => {
      phase            = 'deal';
      selectedCard     = null;
      activeFilterSlot = null;
      renderSidebar();
      renderPitch();
      updateStatus();
    });
  }
}

function pickPlayer(player) {
  selectedCard = player;
  phase        = 'place';
  renderSidebar();
  renderPitch();
  updateStatus();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getNeededPositions() {
  const filled = new Set(Object.keys(slotFills));
  return FORMATIONS[formationKey].slots.filter(s => !filled.has(s.id)).map(s => s.pos);
}
function getEmptyCount() { return 11 - Object.keys(slotFills).length; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateStatus() {
  const filled = Object.keys(slotFills).length;
  const done   = filled === 11;

  draftRoundEl.textContent = `${filled} / 11`;
  const countEl = document.getElementById('headerCount');
  if (countEl) countEl.textContent = `${filled} / 11`;

  teamDealEl.style.display    = done ? 'none' : '';
  simulateAreaEl.style.display = done ? 'block' : 'none';

  if (done) {
    draftHintEl.textContent = 'Mannschaft vollständig — bereit zur Simulation!';
  } else if (phase === 'place') {
    draftHintEl.textContent = `${selectedCard.name} — Klicke auf einen Platz im Feld`;
  } else {
    draftHintEl.textContent = 'Wähle einen Spieler aus dem Kader';
  }
}

btnSimulate.addEventListener('click', () => {
  const formation = FORMATIONS[formationKey];
  const squad = Object.entries(slotFills)
    .filter(([, p]) => p)
    .map(([slotId, player]) => {
      const slot = formation.slots.find(s => s.id === slotId);
      const fit = slot ? playerFitLevel(player, slot.pos) : 'main';
      return { ...player, positionFit: fit, slotPos: slot ? slot.pos : player.position };
    });
  showResults(simulateSeason(squad, gameMode));
});

function showResults(result) {
  lastResult = result;

  // Pre-fill stat elements (hidden until animation completes)
  let headline, cls, sub;
  const perfectBanner = document.getElementById('perfectBanner');
  if (result.isPerfect) {
    headline = '34 – 0'; cls = 'champion';
    sub = 'PERFEKTE SAISON · MEISTER · DIE ADLER SIND UNBEZWINGBAR';
    perfectBanner.classList.add('show');
  } else if (result.position === 1) {
    headline = `${result.wins}–${result.losses}`; cls = 'champion';
    sub = `BUNDESLIGA-MEISTER · ${result.points} PUNKTE · PLATZ 1`;
    perfectBanner.classList.remove('show');
  } else if (result.position === 2) {
    headline = `${result.wins}–${result.losses}`; cls = 'champion';
    sub = `VIZEMEISTER · ${result.points} PUNKTE · PLATZ 2`;
    perfectBanner.classList.remove('show');
  } else if (result.isEuropa) {
    headline = `${result.wins}–${result.losses}`; cls = 'europa';
    sub = `EUROPACUP · ${result.points} PUNKTE · PLATZ ${result.position}`;
    perfectBanner.classList.remove('show');
  } else if (result.isRelegated) {
    headline = `${result.wins}–${result.losses}`; cls = 'relegated';
    sub = `ABSTIEG · ${result.points} PUNKTE · PLATZ ${result.position}`;
    perfectBanner.classList.remove('show');
  } else {
    headline = `${result.wins}–${result.losses}`; cls = 'mid';
    sub = `${result.points} PUNKTE · PLATZ ${result.position} · MITTELFELD`;
    perfectBanner.classList.remove('show');
  }
  document.getElementById('resultHeadline').textContent = headline;
  document.getElementById('resultHeadline').className   = `result-headline ${cls}`;
  document.getElementById('resultSub').textContent      = sub;
  document.getElementById('rPts').textContent           = result.points;
  document.getElementById('rWins').textContent          = result.wins;
  document.getElementById('rGD').textContent            = (result.goalDifference >= 0 ? '+' : '') + result.goalDifference;
  document.getElementById('rPos').textContent           = result.position === 1 ? '🥇 1.' : result.position + '.';

  // Set up modal for animation phase
  const modalTop = document.getElementById('modalTop');
  modalTop.classList.add('hidden');
  modalTop.classList.remove('revealed');

  const ticker = document.getElementById('matchTicker');
  ticker.innerHTML = '';
  ticker.classList.add('animating');

  btnSkip.style.display      = '';
  btnClose.style.display     = 'none';
  btnReset.style.display     = 'none';
  btnShowSquad.style.display = 'none';
  btnDebug.style.display     = 'none';

  modalOverlay.classList.add('open');

  // Cancel any leftover animation from a previous run
  if (tickerInterval) { clearInterval(tickerInterval); tickerInterval = null; }

  // Reveal one match row per second
  let idx = 0;
  tickerInterval = setInterval(() => {
    if (idx >= result.games.length) {
      clearInterval(tickerInterval);
      tickerInterval = null;
      revealFinalStats();
      return;
    }
    ticker.appendChild(renderMatchRow(result.games[idx++], true));
    ticker.scrollTop = ticker.scrollHeight;
  }, 1000);
}

function renderMatchRow(g, animate) {
  const row = document.createElement('div');
  row.className = 'match-row' + (animate ? ' appear' : '');
  const lastName = n => n.split(' ').pop();
  const scorersHTML = g.scorers && g.scorers.length > 0
    ? `<span class="match-scorers">${g.scorers.map(s => `${lastName(s.name)} ${s.minute}'`).join(', ')}</span>`
    : '';
  const ha = g.home ? 'H' : 'A';
  row.innerHTML = `<span class="match-md">${g.matchday}</span><span class="match-ha ${g.home ? 'home' : 'away'}">${ha}</span><span class="match-opp">${g.opponent}</span><span class="match-score ${g.result}">${g.gf}:${g.ga}</span>${scorersHTML}`;
  return row;
}

function revealFinalStats() {
  const ticker  = document.getElementById('matchTicker');
  const modalTop = document.getElementById('modalTop');
  ticker.classList.remove('animating');
  modalTop.classList.remove('hidden');
  modalTop.classList.add('revealed');
  btnSkip.style.display      = 'none';
  btnClose.style.display     = '';
  btnReset.style.display     = '';
  btnShowSquad.style.display = '';
  btnDebug.style.display     = '';
  if (lastResult?.position === 1 || lastResult?.isPerfect) setTimeout(launchFireworks, 200);
}

function stopAnimation() {
  if (tickerInterval) { clearInterval(tickerInterval); tickerInterval = null; }
  stopFireworks();
}

btnSkip.addEventListener('click', () => {
  stopAnimation();
  // Dump any remaining matches instantly
  const ticker = document.getElementById('matchTicker');
  const shown  = ticker.children.length;
  (lastResult?.games || []).slice(shown).forEach(g => {
    ticker.appendChild(renderMatchRow(g, false));
  });
  ticker.scrollTop = ticker.scrollHeight;
  revealFinalStats();
});

btnShowSquad.addEventListener('click', () => {

  body.innerHTML = '';
  const sorted = Object.entries(slotFills).sort(([idA], [idB]) => {
    const posA = FORMATIONS[formationKey]?.slots.find(s => s.id === idA)?.pos ?? 'MF';
    const posB = FORMATIONS[formationKey]?.slots.find(s => s.id === idB)?.pos ?? 'MF';
    return (SQUAD_POS_ORDER[posA] ?? 5) - (SQUAD_POS_ORDER[posB] ?? 5);
  });
  sorted.forEach(([slotId, p]) => {
    const slot     = FORMATIONS[formationKey]?.slots.find(s => s.id === slotId);
    const fit      = slot ? playerFitLevel(p, slot.pos) : 'main';
    const fitColor = fit === 'main' ? '#4caf50' : fit === 'alt' ? 'var(--gold)' : 'var(--red)';
    const fitTag   = fit === 'alt' ? ' · ALT' : fit === 'out' ? ' · OOP' : '';

    const row = document.createElement('div');

      </div>

        <div class="recap-rating">${p.rating}</div>

// ── DEBUG OVERLAY ─────────────────────────────────────────────────────────
btnDebug.addEventListener('click', () => {
  const r = lastResult;
  if (!r) return;

  const pad  = (s, n) => String(s).padEnd(n);
  const rpad = (s, n) => String(s).padStart(n);
  const lines = [];

  lines.push('=== SAISON DEBUG ===');
  lines.push(`Formation: ${formationKey}`);
  lines.push('');

  // Squad
  const formation = FORMATIONS[formationKey];
  const posOrder  = { GK: 0, CB: 1, RB: 2, LB: 3, DM: 4, MF: 5, AM: 6, RW: 7, LW: 8, CF: 9 };
  const slotEntries = Object.entries(slotFills).sort(([a], [b]) => {
    const sa = formation?.slots.find(s => s.id === a), sb = formation?.slots.find(s => s.id === b);
    return (posOrder[sa?.pos] ?? 5) - (posOrder[sb?.pos] ?? 5);
  });

  lines.push('KADER (11 Spieler):');
  slotEntries.forEach(([slotId, p]) => {
    const slot = formation?.slots.find(s => s.id === slotId);
    const fit  = slot ? playerFitLevel(p, slot.pos) : 'main';
    const eff  = fit === 'alt' ? (p.rating * 0.88).toFixed(1) : fit === 'out' ? (p.rating * 0.65).toFixed(1) : null;
    const goals = r.playerGoals?.[p.id] || 0;
    const label = slot?.label ?? posDE(p.position);
    let line = `${pad(label, 5)} ${pad(p.name, 24)} rat:${p.rating}  ${pad(fit, 4)}  dec:${p.decade}  goals:${rpad(goals, 2)}`;
    if (eff) line += `  (eff:${eff})`;
    lines.push(line);
  });
  lines.push('');

  // Engine values
  const atk = r.attackScore, mid = r.midfieldScore, def = r.defenseScore;
  const maxS = Math.max(atk, mid, def), minS = Math.min(atk, mid, def);
  const imbalance = maxS / (minS + 0.01);
  const bp = imbalance <= 1.8 ? 1.0 : Math.max(0.75, 1.0 - (imbalance - 1.8) * 0.115);
  const tp = r.totalPower / 100;
  const wp = Math.min(0.74, Math.max(0.18, 0.12 * tp - 0.58));
  const decades = [...new Set(Object.values(slotFills).map(p => p.decade))].sort();

  lines.push('ENGINE:');
  lines.push(`attackScore:     ${rpad(atk.toFixed(1), 5)}   midfieldScore: ${rpad(mid.toFixed(1), 5)}   defenseScore: ${rpad(def.toFixed(1), 5)}`);
  lines.push(`imbalance:       ${rpad(imbalance.toFixed(3), 5)}   balancePenalty: ${bp.toFixed(2)}${bp < 1.0 ? '  (' + Math.round((1 - bp) * 100) + '% hit)' : '  (no penalty)'}`);
  lines.push(`diversityBonus:  +${r.diversityBonus}%   (${decades.length} decades: ${decades.join(' ')})`);
  lines.push(`totalPower:      ${rpad(tp.toFixed(2), 5)}   baseWinProb: ${wp.toFixed(3)}`);
  lines.push('');

  // Season summary
  lines.push('SAISON:');
  const gd = r.goalDifference >= 0 ? '+' + r.goalDifference : String(r.goalDifference);
  lines.push(`Punkte: ${r.points}   Platz: ${r.position}.   W:${r.wins}  D:${r.draws}  L:${r.losses}   GF:${r.goalsFor}  GA:${r.goalsAgainst}  GD:${gd}`);
  lines.push('');

  // Scorers
  const scorerList = Object.entries(r.playerGoals || {})
    .filter(([, g]) => g > 0)
    .sort(([, a], [, b]) => b - a);
  if (scorerList.length > 0) {
    lines.push('TORSCHÜTZEN:');
    scorerList.forEach(([id, goals]) => {
      const p = Object.values(slotFills).find(pl => pl.id === id);
      lines.push(`  ${pad(p ? p.name : id, 26)} ${goals}`);
    });
    lines.push('');
  }

  // All 34 match results
  lines.push('ERGEBNISSE (34 Spiele):');
  r.games.forEach(g => {
    const lastName = n => n.split(' ').pop();
    const sc = g.scorers.length ? '  [' + g.scorers.map(s => `${lastName(s.name)} ${s.minute}'`).join(', ') + ']' : '';
    lines.push(` ${rpad(g.matchday, 2)}  ${g.result} ${g.home ? 'H' : 'A'}  ${pad(g.opponent, 24)} ${rpad(g.gf + ':' + g.ga, 4)}${sc}`);
  });

  document.getElementById('debugTextarea').value = lines.join('\n');
  debugOverlay.classList.add('open');
});

  const gameCount = isFrauen ? 26 : 34;

// ── FIREWORKS ─────────────────────────────────────────────────────────────
const FW_COLORS = ['#e3001a', '#f5c518', '#ffffff', '#ff6b00', '#cc0015', '#ffd700'];

function launchFireworks() {
  stopFireworks();
  const canvas = document.getElementById('fireworksCanvas');
  if (!canvas) return;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const particles = [];
  let frameId    = null;
  let burstsDone = 0;
  let burstTimer = null;
  const TOTAL_BURSTS = 14;

  function burst() {
    const x     = canvas.width  * (0.15 + Math.random() * 0.70);
    const y     = canvas.height * (0.10 + Math.random() * 0.50);
    const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
    const n     = 65 + Math.floor(Math.random() * 30);
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 / n) * i + (Math.random() - 0.5) * 0.3;
      const speed = 2 + Math.random() * 5;
      particles.push({ x, y, color,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        alpha: 1, decay: 0.011 + Math.random() * 0.01,
        size: 2.5 + Math.random() * 3, gravity: 0.07 });
    }
    for (let i = 0; i < 22; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 2.5;
      particles.push({ x, y, color: '#ffffff',
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        alpha: 1, decay: 0.018 + Math.random() * 0.018,
        size: 1.5 + Math.random() * 2, gravity: 0.04 });
    }
    burstsDone++;
    if (burstsDone < TOTAL_BURSTS) {
      burstTimer = setTimeout(burst, 280 + Math.random() * 380);
    }
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity; p.vx *= 0.98;
      p.alpha -= p.decay;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (particles.length > 0 || burstsDone < TOTAL_BURSTS) {
      frameId = requestAnimationFrame(tick);
    } else {
      canvas.style.display = 'none';
    }
  }

  burst();
  frameId = requestAnimationFrame(tick);

  canvas._stopFW = () => {
    clearTimeout(burstTimer);
    burstsDone = TOTAL_BURSTS;
    if (frameId) cancelAnimationFrame(frameId);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    particles.length = 0;
    canvas._stopFW = null;
  };
}

function stopFireworks() {
  const canvas = document.getElementById('fireworksCanvas');
  if (canvas?._stopFW) canvas._stopFW();
}
